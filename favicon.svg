<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2235"/>
      <stop offset="100%" style="stop-color:#151a23"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7ba5ff"/>
      <stop offset="100%" style="stop-color:#5e81f4"/>
    </linearGradient>
  </defs>

  <!-- Fond arrondi -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Bordure subtile -->
  <rect width="64" height="64" rx="14" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>

  <!-- Lettre M -->
  <text
    x="32"
    y="44"
    text-anchor="middle"
    font-family="'Space Grotesk', 'Inter', Arial, sans-serif"
    font-size="36"
    font-weight="800"
    fill="url(#accent)"
    letter-spacing="-1"
  >M</text>

  <!-- Point décoratif en bas à droite -->
  <circle cx="50" cy="50" r="4" fill="#7ba5ff" opacity="0.7"/>
</svg>
